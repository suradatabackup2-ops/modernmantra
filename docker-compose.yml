# Local dev / single-server deployment.
#
# Quick start:
#   cp .env.example .env
#   # (edit .env with your secret key + admin email)
#   docker compose up --build
#
# Visit:  http://localhost:8000
# Admin:  http://localhost:8000/admin/  (create superuser: see README)
#
# By default this uses the SQLite database baked into the image. To switch
# to Postgres, uncomment the `db` service and the `DATABASE_URL` env var
# in `web`.

services:
  web:
    build: .
    image: modernmantra:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override for local dev (Postgres lives at hostname `db`):
      # - DATABASE_URL=postgres://mm:mm@db:5432/modernmantra
      - DJANGO_DEBUG=False
    volumes:
      # Persist SQLite + any uploaded media across container restarts.
      - mm_data:/app/db_volume
      - ./media:/app/media
    restart: unless-stopped
    # depends_on:
    #   db:
    #     condition: service_healthy

  # ─── Optional Postgres ─────────────────────────────────────────────
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: modernmantra
  #     POSTGRES_USER: mm
  #     POSTGRES_PASSWORD: mm
  #   volumes:
  #     - mm_pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U mm -d modernmantra"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
